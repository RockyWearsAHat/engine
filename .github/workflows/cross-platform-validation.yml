name: Cross-platform validation

on:
  push:
    branches:
      - main
      - master
      - dev
  pull_request:

permissions:
  contents: read
  issues: read

jobs:
  validate:
    name: Validate on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux desktop dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf pkg-config

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Build web client
        run: pnpm build

      - name: Test Go sidecar
        working-directory: packages/server-go
        run: go test ./...

      - name: Build Go sidecar binary
        run: pnpm build:go

      - name: Check desktop crate
        run: pnpm check:desktop

      - name: Build desktop debug binary
        run: pnpm build:desktop-debug

      - name: Run cross-platform smoke validation
        env:
          ENGINE_GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm smoke:system
