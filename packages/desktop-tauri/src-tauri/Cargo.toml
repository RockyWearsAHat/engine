[package]
name = "engine"
version = "0.1.0"
description = "Engine — AI-native code editor"
authors = ["Alex Waldmann"]
edition = "2021"

[lib]
name = "engine_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[[bin]]
name = "engine"
path = "src/main.rs"

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
tauri-plugin-opener = "2"
tauri-plugin-dialog = "2"
tauri-plugin-fs = "2"
tauri-plugin-process = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
dirs = "5"

[profile.release]
panic = "abort"
codegen-units = 1
lto = true
opt-level = "s"
strip = true
